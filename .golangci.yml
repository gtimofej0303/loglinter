# .golangci.yml
version: "2"

linters:
  default: none
  enable:
    - loglinter
  settings:
    custom:
      loglinter:
        type: module
        description: Checks log messages.
        settings:
          words:
              - "internal"
              - "secret"
              - "debug_mode"
          patterns:
            - "credit.?card"
            - "social.?security"